name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: apps/android
        run: ./gradlew :app:assemblePlayDebug

      - name: Find and rename APK
        run: |
          find apps/android/app/build/outputs/apk -name "*.apk" -type f
          APK_PATH=$(find apps/android/app/build/outputs/apk -name "*.apk" -type f | head -1)
          echo "Found APK: $APK_PATH"
          cp "$APK_PATH" apps/android/app/build/outputs/apk/play/debug/anyclaw.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyclaw
          path: apps/android/app/build/outputs/apk/play/debug/anyclaw.apk

      - name: Create Release
        if: github.ref_type == 'branch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "AnyClaw v${{ github.run_number }} (${{ github.ref_name }})"
          body: |
            🦞 **AnyClaw** — OpenClaw + Codex on Android

            📱 Install the APK on any ARM64 Android 7.0+ device. No root required.
          files: apps/android/app/build/outputs/apk/play/debug/anyclaw.apk
          draft: false
          prerelease: false
