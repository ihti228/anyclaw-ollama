name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "21"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Vue frontend
        run: pnpm run build:frontend
        continue-on-error: true

      - name: Build CLI server
        run: pnpm run build:cli
        continue-on-error: true

      - name: Bundle server into APK assets
        run: bash android/scripts/build-server-bundle.sh
        continue-on-error: true

      - name: Download Termux bootstrap
        run: bash android/scripts/download-bootstrap.sh
        continue-on-error: true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: apps/android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          find apps/android/app/build/outputs/apk -name "*.apk" -type f
          APK_PATH=$(find apps/android/app/build/outputs/apk -name "*.apk" -type f | head -1)
          echo "Found APK: $APK_PATH"
          cp "$APK_PATH" apps/android/app/build/outputs/apk/anyclaw.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyclaw
          path: apps/android/app/build/outputs/apk/anyclaw.apk

      - name: Create Release
        if: github.ref_type == 'branch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "AnyClaw v${{ github.run_number }} (${{ github.ref_name }})"
          body: |
            🦞 **AnyClaw** — OpenClaw + Codex on Android

            📱 Install the APK on any ARM64 Android 7.0+ device. No root required.
          files: apps/android/app/build/outputs/apk/anyclaw.apk
          draft: false
          prerelease: false
