name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Bundle server into APK assets
        run: bash apps/android/scripts/build-server-bundle.sh

      - name: Download Termux bootstrap
        run: bash apps/android/scripts/download-bootstrap.sh

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: apps/android
        run: ./gradlew :app:assemblePlayDebug

      - name: Rename APK
        run: cp apps/android/app/build/outputs/apk/play/debug/app-play-debug.apk apps/android/app/build/outputs/apk/play/debug/anyclaw.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyclaw
          path: apps/android/app/build/outputs/apk/play/debug/anyclaw.apk

      - name: Generate changelog
        if: github.ref_type == 'branch'
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --reverse)
          else
            CHANGES=$(git log --pretty=format:"- %s" --reverse -20)
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$CHANGES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: github.ref_type == 'branch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "AnyClaw v${{ github.run_number }} (${{ github.ref_name }})"
          body: |
            🦞 **AnyClaw** — OpenClaw + Codex on Android

            📱 Install the APK on any ARM64 Android 7.0+ device. No root required.

            ### Changes
            ${{ steps.changelog.outputs.notes }}

            ---
            Branch: ${{ github.ref_name }}
            Built from commit ${{ github.sha }}
          files: apps/android/app/build/outputs/apk/play/debug/anyclaw.apk
          draft: false
          prerelease: false
